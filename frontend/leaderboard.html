<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA_OS // LEADERBOARD_VECTORS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="hud_core.css">
    <script src="fui_audio.js"></script>
    <style>
        .leaderboard-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-right: 15px;
        }

        .leader-entry {
            display: grid;
            grid-template-columns: 50px 100px 1fr 100px 150px;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--matrix-green-dim);
            background: var(--matrix-green-faint);
            position: relative;
        }

        .leader-entry:hover {
            border-color: var(--matrix-green);
            background: var(--matrix-green-dim);
        }

        .rank-num {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--matrix-green-dim);
        }

        .leader-entry:nth-child(-n+3) .rank-num {
            color: var(--matrix-green);
            text-shadow: 0 0 10px var(--matrix-green);
        }

        .performance-bar {
            height: 4px;
            background: var(--matrix-green-dim);
            position: relative;
            margin-top: 5px;
        }

        .performance-fill {
            height: 100%;
            background: var(--matrix-green);
            box-shadow: 0 0 5px var(--matrix-green);
        }

        .stat-label {
            font-size: 8px;
            opacity: 0.5;
        }

        .stat-value {
            font-size: 14px;
            font-family: var(--font-display);
        }
    </style>
</head>
<body class="boot-anim">
    <div class="scanlines"></div>
    <div class="grid"></div>
    <div class="vignette"></div>

    <div class="hud-layout">
        <header style="grid-column: 1 / -1; border-bottom: 1px solid var(--matrix-green-dim); display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 5px;">
            <div>
                <div style="font-size: 9px; opacity: 0.5;">DATA_SYNC: ACTIVE_CONTINUUM</div>
                <div style="font-family: var(--font-display); font-weight: bold; font-size: 18px;">GLOBAL_COMBAT_LEADERBOARD</div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 9px; opacity: 0.5;">QUERY_PROTOCOL: SQL_VECTOR_B</div>
                <div id="clock" style="font-family: var(--font-mono); font-size: 16px;">00:00:00:00</div>
            </div>
        </header>

        <aside class="sidebar-left">
            <div class="fui-box" style="height: 100%;">
                <div class="fui-box-inner"></div>
                <div class="metadata-label">ELITE_METRICS</div>
                <div style="padding: 10px;">
                    <div class="stat-label">TOP_OPERATOR_ELO</div>
                    <div class="stat-value">SR-2850</div>
                    <div class="performance-bar"><div class="performance-fill" style="width: 95%;"></div></div>
                    
                    <div style="margin-top: 20px;" class="stat-label">AVERAGE_COMBAT_DUR</div>
                    <div class="stat-value">12:45 MIN</div>
                    
                    <div style="margin-top: 20px;" class="stat-label">GLOBAL_PARTICIPATION</div>
                    <div class="stat-value">12,402 ACT</div>
                </div>
                <div class="oscilloscope"></div>
            </div>
        </aside>

        <main class="main-view">
            <div class="leaderboard-container" id="leaderboard">
                <!-- Entries will be inserted here -->
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="fui-box" style="height: 100%;">
                <div class="fui-box-inner"></div>
                <div class="metadata-label">DATA_ANALYSIS_LOG</div>
                <div id="log-container" class="log-container">
                    <!-- Logs -->
                </div>
            </div>
        </aside>

        <footer style="grid-column: 1 / -1; border-top: 1px solid var(--matrix-green-dim); display: flex; align-items: center; justify-content: space-between;">
            <div style="font-family: var(--font-mono); font-size: 10px;">
                ROOT / SYSTEMS / ANALYTICS / <span style="color: var(--fui-white);">LEADERBOARD_V1.12</span>
            </div>
            <div style="display: flex; gap: 20px;">
                <span class="metadata-label">QUERY_LATENCY: 5ms</span>
                <span class="metadata-label">REFRESH_RATE: 0.5HZ</span>
            </div>
        </footer>
    </div>

    <script>
        const leaderboard = document.getElementById('leaderboard');
        const logContainer = document.getElementById('log-container');

        const topOperators = [
            { name: 'KISHEN_N', elo: 2850, games: 1420, winRate: 78 },
            { name: 'DHRUVA_ANAND', elo: 2710, games: 980, winRate: 72 },
            { name: 'NEHA_DUVVURU', elo: 2650, games: 1120, winRate: 70 },
            { name: 'SOHAM_C', elo: 2420, games: 850, winRate: 68 },
            { name: 'VARSHITH_A', elo: 2380, games: 920, winRate: 65 },
            { name: 'ANYA_JAIN', elo: 2210, games: 740, winRate: 62 },
            { name: 'ARUSHA_B', elo: 2150, games: 680, winRate: 60 },
            { name: 'VEERAJ_L', elo: 2100, games: 590, winRate: 58 },
            { name: 'SURYANSH_R', elo: 2050, games: 540, winRate: 55 },
            { name: 'MIKHAIL_C', elo: 1980, games: 480, winRate: 52 },
        ];

        function renderLeaderboard() {
            leaderboard.innerHTML = topOperators.map((op, i) => `
                <div class="leader-entry">
                    <div class="rank-num">#${(i+1).toString().padStart(2, '0')}</div>
                    <div style="font-size: 9px; opacity: 0.5;">UID: ${2025111001 + i}</div>
                    <div style="font-weight: bold; font-size: 14px;">${op.name}</div>
                    <div style="text-align: right;">
                        <div class="stat-label">SR_RATING</div>
                        <div class="stat-value">${op.elo}</div>
                    </div>
                    <div style="padding-left: 20px;">
                        <div class="stat-label">WIN_PROBABILITY</div>
                        <div class="performance-bar"><div class="performance-fill" style="width: ${op.winRate}%;"></div></div>
                        <div style="font-size: 8px; text-align: right;">${op.winRate}%</div>
                    </div>
                </div>
            `).join('');
        }

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            entry.innerHTML = `<span class="timestamp">[${time}]</span> <span class="message">${msg}</span>`;
            logContainer.prepend(entry);
            
            // SFX
            if (window.HUDAudio) HUDAudio.beep();
        }

        // Clock logic
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').textContent = n.toISOString().split('T')[1].replace('Z', '').slice(0, 11);
        }, 33);

        renderLeaderboard();
        addLog("QUERY_EXECUTED: SELECT TOP 10 FROM OPERATORS");
        addLog("VECTORS_NORMALIZED");
    </script>
</body>
</html>
